name: triadic-microgpt
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy
  - matplotlib
  - tqdm
  - pip
  - pip:
    - torch>=2.0 --index-url https://download.pytorch.org/whl/cu128
    - torchvision --index-url https://download.pytorch.org/whl/cu128
    - torchaudio --index-url https://download.pytorch.org/whl/cu128
    - tokenizers>=0.13
    - transformers>=4.30
    - PySide6>=6.4
