name: CI — triadic-head

on:
  push:
    branches: [master]
    paths:
      - "triadic-head/**"
  pull_request:
    branches: [master]
    paths:
      - "triadic-head/**"

defaults:
  run:
    working-directory: triadic-head

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff>=0.4
      - run: ruff check triadic_head/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]" pytest-cov
      - run: pytest tests/ -v --tb=short --cov=triadic_head --cov-report=xml
      - if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: triadic-head/coverage.xml
          fail_ci_if_error: false
