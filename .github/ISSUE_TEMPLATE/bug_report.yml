name: Bug Report
description: Report a bug in TriadicGPT or triadic-head
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or commands to reproduce the issue
      render: python
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - OS:
        - Python version:
        - PyTorch version:
        - GPU (if applicable):
      render: text
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error logs
      description: Paste the full traceback or error output
      render: text
